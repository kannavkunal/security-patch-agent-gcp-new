{{- if .Values.istio.enabled }}
{{- if .Values.istio.destinationRule.create }}
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: {{ include "security-patch-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "security-patch-agent.labels" . | nindent 4 }}
spec:
  host: {{ include "security-patch-agent.fullname" . }}.{{ .Values.namespace }}.svc.cluster.local
  trafficPolicy:
    loadBalancer:
      simple: {{ .Values.istio.destinationRule.loadBalancer | default "ROUND_ROBIN" }}
    connectionPool:
      tcp:
        maxConnections: {{ .Values.istio.destinationRule.connectionPool.tcp.maxConnections | default 100 }}
      http:
        http1MaxPendingRequests: {{ .Values.istio.destinationRule.connectionPool.http.http1MaxPendingRequests | default 100 }}
        http2MaxRequests: {{ .Values.istio.destinationRule.connectionPool.http.http2MaxRequests | default 100 }}
        maxRequestsPerConnection: {{ .Values.istio.destinationRule.connectionPool.http.maxRequestsPerConnection | default 2 }}
    outlierDetection:
      consecutiveErrors: {{ .Values.istio.destinationRule.outlierDetection.consecutiveErrors | default 5 }}
      interval: {{ .Values.istio.destinationRule.outlierDetection.interval | default "30s" }}
      baseEjectionTime: {{ .Values.istio.destinationRule.outlierDetection.baseEjectionTime | default "30s" }}
      maxEjectionPercent: {{ .Values.istio.destinationRule.outlierDetection.maxEjectionPercent | default 50 }}
      minHealthPercent: {{ .Values.istio.destinationRule.outlierDetection.minHealthPercent | default 50 }}
{{- end }}
{{- end }}
