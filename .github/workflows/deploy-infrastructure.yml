name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      components:
        description: 'Components to deploy'
        required: true
        type: choice
        options:
          - all
          - gke-only
          - artifact-registry-only
          - monitoring-only

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: code-vulnerability-scanner
  GKE_REGION: us-central1

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0

    - name: Create Terraform State Bucket
      run: |
        BUCKET_NAME="${PROJECT_ID}-terraform-state"

        echo "Checking if state bucket exists: gs://${BUCKET_NAME}"

        # Check if bucket exists
        if gsutil ls -b "gs://${BUCKET_NAME}" 2>/dev/null; then
          echo "✓ Bucket already exists"
        else
          echo "Creating state bucket: gs://${BUCKET_NAME}"
          gsutil mb -p $PROJECT_ID -l $GKE_REGION "gs://${BUCKET_NAME}"
          echo "✓ Bucket created"
        fi

        # Enable versioning for state file protection
        echo "Enabling versioning..."
        gsutil versioning set on "gs://${BUCKET_NAME}"
        echo "✓ Versioning enabled"

    - name: Terraform Init
      run: |
        cd infrastructure/terraform

        # Create backend config file with dynamic bucket name
        cat > backend.tfvars <<EOF
bucket = "${PROJECT_ID}-terraform-state"
EOF

        terraform init -backend-config=backend.tfvars

    - name: Terraform Validate
      run: |
        cd infrastructure/terraform
        terraform validate

    - name: Import Existing Resources
      if: github.event.inputs.action == 'apply'
      run: |
        cd infrastructure/terraform

        echo "========================================="
        echo "Importing existing resources into state"
        echo "========================================="

        # GKE Cluster (import first - other resources may depend on it)
        echo "1. GKE Cluster..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_container_cluster.primary[0]' "projects/$PROJECT_ID/locations/$GKE_REGION/clusters/code-vulnerability-scanner" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → Skipped (not found or already imported)"

        # VPC Network
        echo "2. VPC Network..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_compute_network.vpc[0]' "projects/$PROJECT_ID/global/networks/code-vulnerability-scanner-vpc" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → Skipped (not found or already imported)"

        # Subnet
        echo "3. Subnet..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_compute_subnetwork.subnet[0]' "projects/$PROJECT_ID/regions/$GKE_REGION/subnetworks/code-vulnerability-scanner-subnet" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → Skipped (not found or already imported)"

        # Service Account
        echo "4. Service Account..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_service_account.app_sa[0]' "projects/$PROJECT_ID/serviceAccounts/security-patch-agent@$PROJECT_ID.iam.gserviceaccount.com" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → Skipped (not found or already imported)"

        # GCS Bucket
        echo "5. GCS Bucket..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_storage_bucket.evidence_bucket' "security-patch-evidence-$PROJECT_ID" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → Skipped"

        # Artifact Registry
        echo "6. Artifact Registry..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_artifact_registry_repository.docker_repo[0]' "projects/$PROJECT_ID/locations/$GKE_REGION/repositories/security-patch-agent" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → Skipped"

        # Logging Metrics
        echo "7. Logging Metrics..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_logging_metric.scan_completed' "$PROJECT_ID/security_patch_agent_scans_completed" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → scan_completed skipped"

        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_logging_metric.scan_failed' "$PROJECT_ID/security_patch_agent_scans_failed" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → scan_failed skipped"

        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_logging_metric.pr_created' "$PROJECT_ID/security_patch_agent_prs_created" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → pr_created skipped"

        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_logging_metric.evidence_generated' "$PROJECT_ID/security_patch_agent_evidence_generated" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → evidence_generated skipped"

        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_logging_metric.api_requests' "$PROJECT_ID/security_patch_agent_api_requests" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → api_requests skipped"

        # Pub/Sub Topics
        echo "8. Pub/Sub Topics..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_pubsub_topic.security_scan_events' "projects/$PROJECT_ID/topics/security-scan-events" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → security-scan-events skipped"

        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_pubsub_topic.dead_letter' "projects/$PROJECT_ID/topics/security-scan-events-dlq" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → dead_letter skipped"

        # Pub/Sub Subscription
        echo "9. Pub/Sub Subscription..."
        terraform import -var="project_id=$PROJECT_ID" -var="region=$GKE_REGION" -var="components=${{ github.event.inputs.components }}" \
          'google_pubsub_subscription.dead_letter_sub' "projects/$PROJECT_ID/subscriptions/scan-events-dlq-subscription" 2>&1 | grep -i "import prepared\|already\|error 404\|error 400" || echo "  → Skipped"

        echo ""
        echo "========================================="
        echo "Import complete! Ready for terraform apply"
        echo "========================================="

    - name: Terraform Plan
      if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'
      run: |
        cd infrastructure/terraform
        terraform plan \
          -var="project_id=$PROJECT_ID" \
          -var="region=$GKE_REGION" \
          -var="components=${{ github.event.inputs.components }}" \
          -out=tfplan

    - name: Terraform Apply
      if: github.event.inputs.action == 'apply'
      run: |
        cd infrastructure/terraform
        terraform apply -auto-approve tfplan

    - name: Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: |
        cd infrastructure/terraform
        terraform destroy -auto-approve \
          -var="project_id=$PROJECT_ID" \
          -var="region=$GKE_REGION" \
          -var="components=${{ github.event.inputs.components }}"

  setup-scripts:
    name: Run Setup Scripts
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event.inputs.action == 'apply' && github.event.inputs.components != 'destroy'

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get GKE Credentials
      run: |
        gcloud container clusters get-credentials $GKE_CLUSTER \
          --region=$GKE_REGION \
          --project=$PROJECT_ID

    - name: Setup Workload Identity
      if: github.event.inputs.components == 'all' || github.event.inputs.components == 'gke-only'
      run: |
        chmod +x infrastructure/scripts/setup-workload-identity.sh
        ./infrastructure/scripts/setup-workload-identity.sh

    - name: Setup Monitoring
      if: github.event.inputs.components == 'all' || github.event.inputs.components == 'monitoring-only'
      run: |
        chmod +x infrastructure/scripts/setup-gcp-monitoring.sh
        ./infrastructure/scripts/setup-gcp-monitoring.sh

    - name: Import Dashboards
      if: github.event.inputs.components == 'all' || github.event.inputs.components == 'monitoring-only'
      run: |
        chmod +x infrastructure/scripts/import-dashboards.sh
        ./infrastructure/scripts/import-dashboards.sh

    - name: Infrastructure Summary
      run: |
        echo "## Infrastructure Deployment Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Components Deployed: ${{ github.event.inputs.components }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- GKE Cluster: $GKE_CLUSTER" >> $GITHUB_STEP_SUMMARY
        echo "- Region: $GKE_REGION" >> $GITHUB_STEP_SUMMARY
        echo "- Project: $PROJECT_ID" >> $GITHUB_STEP_SUMMARY
