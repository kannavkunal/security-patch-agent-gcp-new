# Default values for security-patch-agent

# Namespace configuration
namespace: security-patch-agent

replicaCount: 2

# Project configuration
project:
  id: "compact-orb-498606-f9"  # Override with --set project.id=your-project
  region: "us-central1"

image:
  repository: "us-central1-docker.pkg.dev/{{ .Values.project.id }}/security-patch-agent/api"
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Istio Configuration
istio:
  enabled: true
  gateway:
    create: true
    name: security-patch-agent-gateway
    # Gateway will be created in istio-system namespace
    hosts:
      - "*"  # Change to your domain (e.g., security.example.com)
    tls:
      enabled: false  # Set to true for HTTPS
      credentialName: security-patch-agent-tls  # K8s secret name for TLS cert
  virtualService:
    create: true
    hosts:
      - "*"  # Must match gateway hosts
  destinationRule:
    create: true
    loadBalancer: ROUND_ROBIN  # Options: ROUND_ROBIN, LEAST_CONN, RANDOM, PASSTHROUGH
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 100
        maxRequestsPerConnection: 2
    outlierDetection:
      consecutiveErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
  # Rate Limiting
  rateLimit:
    enabled: true  # Enable rate limiting
    maxTokens: 50  # Max requests in bucket
    tokensPerFill: 50  # Tokens to add per interval
    fillInterval: 60s  # Refill interval (50 requests per 60s)
  # Security Policies
  security:
    # mTLS Configuration
    mtls:
      enabled: false  # Set to true to enforce mTLS
      mode: PERMISSIVE  # Options: STRICT, PERMISSIVE, DISABLE
    # JWT Authentication
    jwt:
      enabled: false  # Set to true to enable JWT auth
      jwtRules: []
      # Example JWT config:
      # - issuer: "https://accounts.google.com"
      #   jwksUri: "https://www.googleapis.com/oauth2/v3/certs"
      #   audiences: ["your-client-id"]
      #   fromHeaders:
      #   - name: "Authorization"
      #     prefix: "Bearer "
    # Authorization Policy
    authorization:
      enabled: true  # ENABLED to whitelist IPs
      action: ALLOW
      rules:
      # Whitelist specific IPs
      - from:
        - source:
            ipBlocks: 
              - "199.167.52.5/32"  # Your current IP
              # Add more IPs below as needed:
              # - "203.0.113.5/32"
              # - "198.51.100.0/24"
        to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE"]
            paths: ["/*"]
      #   - operation:
      #       methods: ["GET", "POST"]
      #       paths: ["/analyze", "/health"]

# Sidecar Containers
sidecars:
  # Fluent Bit logging sidecar
  logging:
    enabled: true
    image: fluent/fluent-bit:2.2
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi

# Workload Identity Configuration
workloadIdentity:
  enabled: true
  gcpServiceAccount: "security-patch-agent@{{ .Values.project.id }}.iam.gserviceaccount.com"

serviceAccount:
  create: true
  annotations: {}
  name: "security-patch-agent-sa"

# API Key Authentication
# SECURITY: API keys should NEVER be committed to git!
# Keys are injected during deployment from GitHub Secrets
# Generate keys with: openssl rand -hex 32
apiKeys:
  enabled: true  # Enable API key authentication
  # Keys injected via --set apiKeys.keys={key1,key2} during deployment
  keys: []  # Empty by default - populated from GitHub Secrets

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP  # Changed to ClusterIP for Istio Gateway
  port: 80
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: security-patch-agent.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}
