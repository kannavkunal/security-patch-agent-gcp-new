name: Full Deployment Pipeline

on:
  workflow_dispatch:
    inputs:
      deploy_infrastructure:
        description: 'Deploy infrastructure (Terraform)'
        required: true
        type: boolean
        default: true
      infrastructure_components:
        description: 'Infrastructure components (if enabled)'
        required: false
        type: choice
        options:
          - all
          - gke-only
          - monitoring-only
        default: 'all'
      deploy_application:
        description: 'Deploy application'
        required: true
        type: boolean
        default: true
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - staging
          - development
        default: 'production'
      run_security_scan:
        description: 'Run security scans'
        required: true
        type: boolean
        default: true
      run_tests:
        description: 'Run tests'
        required: true
        type: boolean
        default: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: code-vulnerability-scanner
  GKE_REGION: us-central1
  REPOSITORY: security-patch-agent
  IMAGE: api
  NAMESPACE: security-patch-agent

jobs:
  # Step 1: Security Scanning
  security-scan:
    name: "Step 1: Security Scan"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_security_scan == 'true' }}

    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install security tools
      run: |
        pip install bandit safety pylint

    - name: Run Bandit
      run: |
        bandit -r app/ -ll || echo "Security issues found but continuing..."
      continue-on-error: true

    - name: Check dependencies
      run: |
        safety check --file=app/requirements.txt || true
      continue-on-error: true

    - name: Build Docker image for scanning
      run: |
        docker build -t security-scan:${{ github.sha }} ./app

    - name: Run Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'security-scan:${{ github.sha }}'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Security scan summary
      run: |
        echo "## Security Scan Complete ✅" >> $GITHUB_STEP_SUMMARY
        echo "- Code scan: Completed" >> $GITHUB_STEP_SUMMARY
        echo "- Container scan: Completed" >> $GITHUB_STEP_SUMMARY
        echo "- Dependency check: Completed" >> $GITHUB_STEP_SUMMARY

  # Step 2: Build and Test
  build-and-test:
    name: "Step 2: Build and Test"
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: |
      always() &&
      (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped') &&
      github.event.inputs.run_tests == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r app/requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx

    - name: Run unit tests
      run: |
        cd app
        pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml

    - name: Build Docker image
      run: |
        docker build -t test-image:${{ github.sha }} ./app

    - name: Test container
      run: |
        docker run -d --name test-container -p 8080:8080 \
          -e GCP_PROJECT_ID=$PROJECT_ID \
          -e GCP_LOCATION=$GKE_REGION \
          -e PUBSUB_TOPIC=test-topic \
          -e TESTING=true \
          test-image:${{ github.sha }}

        # Wait for container to be ready
        echo "Waiting for container to start..."
        for i in {1..30}; do
          if docker logs test-container 2>&1 | grep -q "Uvicorn running\|Application startup complete"; then
            echo "Container started successfully"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "Container failed to start. Logs:"
            docker logs test-container
            exit 1
          fi
          sleep 1
        done

        curl -f http://localhost:8080/health || (docker logs test-container && exit 1)
        docker stop test-container
        echo "Container health check: PASSED ✅"

    - name: Test summary
      run: |
        echo "## Build and Test Complete ✅" >> $GITHUB_STEP_SUMMARY
        echo "- Unit tests: PASSED" >> $GITHUB_STEP_SUMMARY
        echo "- Docker build: SUCCESS" >> $GITHUB_STEP_SUMMARY
        echo "- Container test: PASSED" >> $GITHUB_STEP_SUMMARY

  # Step 3: Deploy Infrastructure (Optional)
  deploy-infrastructure:
    name: "Step 3: Deploy Infrastructure (Terraform)"
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: |
      always() &&
      (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped') &&
      github.event.inputs.deploy_infrastructure == 'true'

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.7.0

    - name: Terraform Init
      run: |
        cd infrastructure/terraform
        terraform init -reconfigure

    - name: Remove GKE Resources from State (monitoring-only mode)
      if: github.event.inputs.infrastructure_components == 'monitoring-only'
      run: |
        cd infrastructure/terraform

        echo "🗑️  Removing GKE resources from Terraform state..."
        echo "These resources exist in GCP but shouldn't be managed by monitoring-only mode"
        echo ""

        # Remove GKE cluster, VPC, and subnet from state (don't delete actual resources)
        terraform state rm 'google_container_cluster.primary[0]' 2>/dev/null || echo "  GKE cluster not in state"
        terraform state rm 'google_compute_network.vpc[0]' 2>/dev/null || echo "  VPC not in state"
        terraform state rm 'google_compute_subnetwork.subnet[0]' 2>/dev/null || echo "  Subnet not in state"

        echo ""
        echo "✅ GKE resources removed from state (actual resources preserved)"

    - name: Skip Import (Use Monitoring-Only Mode Instead)
      run: |
        echo "⚠️  IMPORTANT: If resources already exist, use 'monitoring-only' mode"
        echo ""
        echo "This deployment has 'components=${{ github.event.inputs.infrastructure_components }}'"
        echo ""
        if [ "${{ github.event.inputs.infrastructure_components }}" = "monitoring-only" ]; then
          echo "✅ Using monitoring-only mode - will not create GKE/Pub/Sub/BigQuery"
          echo "   Only monitoring dashboards and alerts will be deployed"
        else
          echo "⚠️  WARNING: This will attempt to create all infrastructure"
          echo "   If resources already exist, you may see 409 errors"
          echo "   Recommendation: Cancel and re-run with 'monitoring-only'"
        fi

    - name: Terraform Plan
      run: |
        cd infrastructure/terraform
        terraform plan \
          -var="project_id=$PROJECT_ID" \
          -var="region=$GKE_REGION" \
          -var="components=${{ github.event.inputs.infrastructure_components }}" \
          -out=tfplan

    - name: Terraform Apply
      run: |
        cd infrastructure/terraform
        terraform apply -auto-approve tfplan

    - name: Infrastructure summary
      run: |
        echo "## Infrastructure Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
        echo "- Components: ${{ github.event.inputs.infrastructure_components }}" >> $GITHUB_STEP_SUMMARY
        echo "- Terraform state: Remote state disabled (using local)/security-patch-agent/" >> $GITHUB_STEP_SUMMARY

  # Step 4: Build and Push Docker Image
  build-and-push:
    name: "Step 4: Build and Push Docker Image"
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy-infrastructure]
    if: |
      always() &&
      (needs.build-and-test.result == 'success' || needs.build-and-test.result == 'skipped') &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped') &&
      github.event.inputs.deploy_application == 'true'

    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ steps.build.outputs.tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: |
        gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build and Push
      id: build
      run: |
        cd app
        IMAGE_TAG="${{ github.event.inputs.environment }}-${{ github.sha }}"
        echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

        docker build \
          --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
          --build-arg VERSION=$IMAGE_TAG \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$IMAGE_TAG \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:latest \
          .

        docker push us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$IMAGE_TAG
        docker push us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:latest

        echo "## Docker Image Built and Pushed ✅" >> $GITHUB_STEP_SUMMARY
        echo "- Image: us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$IMAGE_TAG" >> $GITHUB_STEP_SUMMARY

  # Step 5: Deploy to GKE
  deploy-to-gke:
    name: "Step 5: Deploy to GKE"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      github.event.inputs.deploy_application == 'true'

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Install GKE Auth Plugin
      run: |
        gcloud components install gke-gcloud-auth-plugin

    - name: Get GKE Credentials
      run: |
        gcloud container clusters get-credentials $GKE_CLUSTER \
          --region=$GKE_REGION \
          --project=$PROJECT_ID

    - name: Deploy to Kubernetes
      run: |
        IMAGE_TAG="${{ github.event.inputs.environment }}-${{ github.sha }}"

        # Apply namespace first
        kubectl apply -f deployment/k8s-manifests/01-namespace.yaml

        # Apply service account with PROJECT_ID replaced
        sed "s/PROJECT_ID_PLACEHOLDER/$PROJECT_ID/g" deployment/k8s-manifests/02-serviceaccount.yaml | kubectl apply -f -

        # Create/update ConfigMap from GitHub Secrets (NOT from static file)
        kubectl create configmap security-patch-agent-config \
          --from-literal=GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
          --from-literal=GCP_LOCATION="$GKE_REGION" \
          --from-literal=PUBSUB_TOPIC="security-scan-events" \
          --from-literal=PUBSUB_SUBSCRIPTION="scan-events-subscription" \
          --from-literal=K8S_NAMESPACE="$NAMESPACE" \
          --from-literal=ALLOWED_REPO_OWNERS="kannavkunal" \
          --from-literal=ALLOWED_REPO_PATTERN="vulnerable-*" \
          --from-literal=EXCLUDED_REPOS="" \
          --from-literal=REPO_CACHE_TTL="300" \
          --from-literal=VULNERABLE_REPOS="https://github.com/kannavkunal/vulnerable-python-api,https://github.com/kannavkunal/vulnerable-node-service,https://github.com/kannavkunal/vulnerable-go-microservice,https://github.com/kannavkunal/vulnerable-java-app" \
          -n $NAMESPACE \
          --dry-run=client -o yaml | kubectl apply -f -

        # Create/update secret from GitHub Secrets (NOT from file)
        kubectl create secret generic security-patch-agent-api-keys \
          --from-literal=api-keys="${{ secrets.API_KEY_PRIMARY }},${{ secrets.API_KEY_SECONDARY }}" \
          -n $NAMESPACE \
          --dry-run=client -o yaml | kubectl apply -f -

        # Apply service first
        kubectl apply -f deployment/k8s-manifests/06-service.yaml

        # Apply deployment with PROJECT_ID replaced (image tags will be updated next)
        sed "s/PROJECT_ID_PLACEHOLDER/$PROJECT_ID/g" deployment/k8s-manifests/05-deployment.yaml | kubectl apply -f -

        # Update images for both containers
        kubectl set image deployment/security-patch-agent \
          api=us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$IMAGE_TAG \
          worker=us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$IMAGE_TAG \
          -n $NAMESPACE

        # Wait for rollout
        kubectl rollout status deployment/security-patch-agent -n $NAMESPACE --timeout=10m

    - name: Get LoadBalancer IP
      id: get-ip
      run: |
        echo "Waiting for LoadBalancer IP..."
        for i in {1..30}; do
          EXTERNAL_IP=$(kubectl get svc security-patch-agent -n $NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -n "$EXTERNAL_IP" ]; then
            echo "ip=$EXTERNAL_IP" >> $GITHUB_OUTPUT
            echo "LoadBalancer IP: $EXTERNAL_IP"
            break
          fi
          sleep 10
        done

    - name: Health Check
      run: |
        EXTERNAL_IP="${{ steps.get-ip.outputs.ip }}"
        if [ -n "$EXTERNAL_IP" ]; then
          echo "Testing health endpoint..."
          curl -f http://$EXTERNAL_IP/health || exit 1
          echo "Health check: PASSED ✅"
        fi

    - name: Deployment Summary
      run: |
        EXTERNAL_IP="${{ steps.get-ip.outputs.ip }}"
        echo "## 🎉 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Details" >> $GITHUB_STEP_SUMMARY
        echo "- Environment: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        echo "- Image Tag: ${{ needs.build-and-push.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- LoadBalancer IP: ${EXTERNAL_IP:-pending}" >> $GITHUB_STEP_SUMMARY
        echo "- Namespace: $NAMESPACE" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Your API" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "curl http://${EXTERNAL_IP}/health" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Quick Links" >> $GITHUB_STEP_SUMMARY
        echo "- [GKE Workloads](https://console.cloud.google.com/kubernetes/workload?project=$PROJECT_ID)" >> $GITHUB_STEP_SUMMARY
        echo "- [Cloud Monitoring](https://console.cloud.google.com/monitoring?project=$PROJECT_ID)" >> $GITHUB_STEP_SUMMARY
        echo "- [Cloud Logging](https://console.cloud.google.com/logs/query?project=$PROJECT_ID)" >> $GITHUB_STEP_SUMMARY

  # Step 6: Integration Tests
  integration-tests:
    name: "Step 6: Integration Tests"
    runs-on: ubuntu-latest
    needs: [deploy-to-gke]
    if: |
      always() &&
      needs.deploy-to-gke.result == 'success'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Wait for deployment
      run: sleep 30

    - name: Run integration tests
      run: |
        echo "Integration tests would run here"
        echo "## Integration Tests Complete ✅" >> $GITHUB_STEP_SUMMARY

  # Final Summary
  deployment-summary:
    name: "📊 Deployment Summary"
    runs-on: ubuntu-latest
    needs: [security-scan, build-and-test, deploy-infrastructure, build-and-push, deploy-to-gke, integration-tests]
    if: always()

    steps:
    - name: Generate Summary
      run: |
        echo "# 🚀 Full Deployment Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| 1. Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 2. Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 3. Deploy Infrastructure | ${{ needs.deploy-infrastructure.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 4. Build & Push Image | ${{ needs.build-and-push.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 5. Deploy to GKE | ${{ needs.deploy-to-gke.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| 6. Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
