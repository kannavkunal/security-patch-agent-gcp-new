{{- if .Values.istio.enabled }}
{{- if .Values.istio.security.mtls.enabled }}
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: {{ include "security-patch-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "security-patch-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "security-patch-agent.selectorLabels" . | nindent 6 }}
  mtls:
    mode: {{ .Values.istio.security.mtls.mode | upper }}
{{- end }}
{{- end }}
