apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-patch-agent-sa
  namespace: security-patch-agent
  annotations:
    iam.gke.io/gcp-service-account: security-patch-agent@compact-orb-498606-f9.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-creator
  namespace: security-patch-agent
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-creator-binding
  namespace: security-patch-agent
subjects:
- kind: ServiceAccount
  name: security-patch-agent-sa
  namespace: security-patch-agent
roleRef:
  kind: Role
  name: job-creator
  apiGroup: rbac.authorization.k8s.io
