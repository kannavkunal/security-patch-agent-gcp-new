{{- if .Values.istio.enabled }}
{{- if .Values.istio.security.authorization.enabled }}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ include "security-patch-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "security-patch-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "security-patch-agent.selectorLabels" . | nindent 6 }}
  action: {{ .Values.istio.security.authorization.action | upper }}
  rules:
  {{- range .Values.istio.security.authorization.rules }}
  - from:
    {{- if .from }}
    {{- toYaml .from | nindent 4 }}
    {{- end }}
    to:
    {{- if .to }}
    {{- toYaml .to | nindent 4 }}
    {{- end }}
    {{- if .when }}
    when:
    {{- toYaml .when | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
