{{- if .Values.istio.enabled }}
{{- if .Values.istio.security.jwt.enabled }}
---
# JWT Authentication
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: {{ include "security-patch-agent.fullname" . }}-jwt
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "security-patch-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "security-patch-agent.selectorLabels" . | nindent 6 }}
  jwtRules:
  {{- range .Values.istio.security.jwt.jwtRules }}
  - issuer: {{ .issuer | quote }}
    {{- if .jwksUri }}
    jwksUri: {{ .jwksUri | quote }}
    {{- end }}
    {{- if .audiences }}
    audiences:
    {{- range .audiences }}
    - {{ . | quote }}
    {{- end }}
    {{- end }}
    {{- if .fromHeaders }}
    fromHeaders:
    {{- range .fromHeaders }}
    - name: {{ .name | quote }}
      {{- if .prefix }}
      prefix: {{ .prefix | quote }}
      {{- end }}
    {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
