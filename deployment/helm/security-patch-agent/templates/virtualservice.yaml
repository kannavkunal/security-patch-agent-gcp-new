{{- if .Values.istio.enabled }}
{{- if .Values.istio.virtualService.create }}
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "security-patch-agent.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "security-patch-agent.labels" . | nindent 4 }}
spec:
  hosts:
  {{- range .Values.istio.virtualService.hosts }}
  - {{ . | quote }}
  {{- end }}
  gateways:
  - istio-system/{{ .Values.istio.gateway.name }}  # Reference gateway in istio-system
  http:
  - match:
    - uri:
        prefix: "/"
    route:
    - destination:
        host: {{ include "security-patch-agent.fullname" . }}.{{ .Values.namespace }}.svc.cluster.local
        port:
          number: {{ .Values.service.port }}
      weight: 100
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: 5xx,reset,connect-failure,refused-stream
{{- end }}
{{- end }}
