name: Build and Test

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  REGISTRY: us-central1-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPOSITORY: security-patch-agent
  IMAGE: api

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r app/requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx

    - name: Run tests
      run: |
        cd app
        pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./app/coverage.xml
        fail_ci_if_error: false

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: false
        tags: |
          ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker container
      run: |
        docker build -t test-image ./app

        echo "Starting container..."
        docker run -d --name test-container -p 8080:8080 \
          -e GCP_PROJECT_ID=test-project \
          -e GCP_LOCATION=us-central1 \
          -e PUBSUB_TOPIC=test-topic \
          -e TESTING=true \
          test-image

        echo "Container started with ID: $(docker ps -q -f name=test-container)"

        # Wait for container to be ready
        echo "Waiting for container to be ready..."
        for i in {1..30}; do
          echo "Attempt $i/30..."

          # Show latest logs
          docker logs test-container --tail 5 2>&1 | sed 's/^/  /'

          # Check if container is still running
          if ! docker ps -q -f name=test-container | grep -q .; then
            echo "ERROR: Container exited!"
            docker logs test-container
            exit 1
          fi

          # Check if uvicorn is ready
          if docker logs test-container 2>&1 | grep -q "Uvicorn running\|Application startup complete"; then
            echo "✅ Container is ready!"
            break
          fi

          if [ $i -eq 30 ]; then
            echo "❌ Container failed to start within 30 seconds. Full logs:"
            docker logs test-container
            exit 1
          fi

          sleep 1
        done

        # Test health endpoint
        echo "Testing /health endpoint..."
        curl -v http://localhost:8080/health || {
          echo "❌ Health check failed. Container logs:"
          docker logs test-container
          exit 1
        }

        echo "✅ Health check passed!"
        docker stop test-container

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linters
      run: |
        pip install black flake8 isort mypy

    - name: Check formatting with Black
      run: |
        black --check app/ || echo "Black formatting issues found"
      continue-on-error: true

    - name: Check import sorting
      run: |
        isort --check-only app/ || echo "Import sorting issues found"
      continue-on-error: true

    - name: Run Flake8
      run: |
        flake8 app/ --max-line-length=120 --extend-ignore=E203,W503 || echo "Flake8 issues found"
      continue-on-error: true
